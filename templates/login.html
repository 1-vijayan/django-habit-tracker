{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

.auth-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.auth-box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.auth-title{
text-align:center;
font-size:24px;
margin-bottom:25px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-size:14px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

.auth-link{
text-align:center;
margin-top:15px;
}

.auth-link a{
color:#38bdf8;
text-decoration:none;
}

.error{
color:#ef4444;
font-size:14px;
margin-bottom:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="auth-container">

<div class="auth-box">

<div class="auth-title">Login</div>

{% if form.errors %}
<div class="error">
Invalid username or password
</div>
{% endif %}

<form method="post">

{% csrf_token %}

<div class="form-group">
<label>Username</label>
{{ form.username }}
</div>

<div class="form-group">
<label>Password</label>
{{ form.password }}
</div>

<button type="submit">Login</button>

</form>

<div class="auth-link">
Don't have an account?
<a href="/register/">Create account</a>
</div>

</div>

</div>

<script src="{% static 'js/theme.js' %}"></script>

</body>

</html>
